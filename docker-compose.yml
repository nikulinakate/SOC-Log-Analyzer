services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      SOC_DATABASE_URL: postgresql+psycopg://soc:soc@postgres:5432/soc
      SOC_ENVIRONMENT: docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: soc
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
